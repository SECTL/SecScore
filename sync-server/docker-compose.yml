services:
  postgres:
    image: postgres:16-alpine
    container_name: secscore-sync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: secscore
      POSTGRES_USER: secscore
      POSTGRES_PASSWORD: secscore
    ports:
      - "54329:5432"
    volumes:
      - secscore_sync_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secscore -d secscore"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  secscore_sync_postgres_data:

